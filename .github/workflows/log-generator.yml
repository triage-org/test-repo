name: Log Generator Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate-logs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Print basic workflow details
        run: |
          echo "Workflow started"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Run ID: ${{ github.run_id }}"
          echo "Timestamp: $(date)"

      - name: Generate sample logs
        run: |
          echo "Starting application simulation..."
          echo "INFO: Loading configuration"
          sleep 2
          echo "INFO: Connecting to service"
          sleep 2
          echo "WARNING: Slow response detected"
          sleep 2
          echo "ERROR: Simulated failure for triage testing"
          exit 1